apiVersion: 1

datasources:
  - name: threat_pg
    uid: threat_pg
    type: postgres
    url: postgres:5432
    database: ${POSTGRES_DB}
    user: ${POSTGRES_USER}
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      sslmode: 'disable'
      maxOpenConns: 50
      maxIdleConns: 50
      connMaxLifetime: 14400
      postgresVersion: 1500
      timescaledb: false
