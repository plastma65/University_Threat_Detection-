[SERVICE]
    Flush        5
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf

# ── INPUTS ──────────────────────────────────────────────────────────────────

[INPUT]
    Name           tail
    Tag            nginx
    Path           /data/raw/nginx_access.log
    Read_from_Head true
    DB             /tmp/fb_nginx.db
    Mem_Buf_Limit  5MB

[INPUT]
    Name           tail
    Tag            auth
    Path           /data/raw/auth.log
    Read_from_Head true
    DB             /tmp/fb_auth.db
    Mem_Buf_Limit  5MB

[INPUT]
    Name           tail
    Tag            firewall
    Path           /data/raw/pfsense.csv
    Read_from_Head true
    DB             /tmp/fb_firewall.db
    Mem_Buf_Limit  5MB

# ── PARSE: extract fields, keep original 'log' key via Preserve_Key ─────────

[FILTER]
    Name         parser
    Match        nginx
    Key_Name     log
    Parser       nginx_combined
    Reserve_Data On
    Preserve_Key On

[FILTER]
    Name         parser
    Match        auth
    Key_Name     log
    Parser       auth_log
    Reserve_Data On
    Preserve_Key On

# ── NORMALIZE: map to schema (ip, user, event_type, raw, source) ─────────────

[FILTER]
    Name   lua
    Match  nginx
    script normalize_nginx.lua
    call   normalize_nginx

[FILTER]
    Name   lua
    Match  auth
    script normalize_auth.lua
    call   normalize_auth

[FILTER]
    Name   lua
    Match  firewall
    script normalize_firewall.lua
    call   normalize_firewall

# ── ENRICH: add container hostname as label ──────────────────────────────────

[FILTER]
    Name   record_modifier
    Match  *
    Record hostname ${HOSTNAME}

# ── OUTPUT: Loki — labels: source + hostname ─────────────────────────────────

[OUTPUT]
    Name        loki
    Match       *
    Host        loki
    Port        3100
    labels      job=fluentbit
    label_keys  $source,$hostname
    line_format json
